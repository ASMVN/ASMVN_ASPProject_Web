server {
    listen 8080;
    root /home/site/wwwroot;
    index index.php index.html;

    # Không cho truy cập file nhạy cảm
    location ~* \.(conf|json|log|sh)$ {
        deny all;
    }

    # ================================
    # 1) REWRITE URL → FILE .php
    # ================================
    # Ví dụ:
    # /manage/edit  → /manage/edit.php (nếu tồn tại)
    # /manage/edit  → /manage/edit_pc.php (nếu tồn tại)
    #
    location / {
        # Nếu folder → load folder
        try_files $uri $uri/ @cleanurl;
    }

    # ================================
    # 2) TỰ ĐỘNG XỬ LÝ URL KHÔNG CÓ .php
    # ================================
    location @cleanurl {
        # Nếu file .php tồn tại → chạy file đó
        if (-f $document_root$uri.php) {
            rewrite ^(.*)$ $1.php last;
        }

        # Nếu file _pc.php tồn tại → chạy file đó
        if (-f $document_root${uri}_pc.php) {
            rewrite ^(.*)$ ${uri}_pc.php last;
        }

        # Nếu không khớp file nào → trả về index.php
        rewrite ^ /index.php?$query_string last;
    }

    # ================================
    # 3) PHP-FPM
    # ================================
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
